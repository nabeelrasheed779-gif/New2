name: Professional Flet Build - Smart Grocery
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # تسريع البناء في المرات القادمة عبر التخزين المؤقت

      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # تخزين Flutter SDK مؤقتاً لتقليل وقت البناء

      - name: 5. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 6. Build Android APK
        run: |
          # إضافة الأذونات المطلوبة وتحديد اسم الحزمة بدقة
          # --include-assets تضمن دمج قاعدة البيانات إذا كانت موجودة مسبقاً
          flet build apk \
            --project "SmartGrocery" \
            --org "com.flet.nabel" \
            --product "Nabel Grocery Store" \
            --build-number ${{ github.run_number }} \
            --build-version "1.5.0"

      - name: 7. Upload Production APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Grocery-V1.5
          path: build/apk/*.apk
          retention-days: 7 # حذف الملف تلقائياً بعد 7 أيام لتوفير المساحة
